<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c4a6e">
<title>ENSO Monitor · 厄尔尼诺/拉尼娜监测</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<!-- iOS: uses its own apple-touch-icon (ignores manifest icons) -->
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ENSO">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{
    --bg:#f0f9ff; --card:#ffffff; --ink:#0f172a; --muted:#475569;
    --line:#e2e8f0; --warm:#dc2626; --cool:#2563eb; --neutral:#475569;
    --accent:#0c4a6e; --warm-bg:#fef2f2; --cool-bg:#eff6ff; --neutral-bg:#f8fafc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","WenQuanYi Zen Hei",
    "Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.5;padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    background:linear-gradient(135deg,#0c4a6e,#0e7490);color:#fff;
    padding:16px;
    padding-top:calc(16px + env(safe-area-inset-top));
  }
  .htop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  h1{font-size:18px;margin:0;font-weight:700}
  .sub{font-size:12px;opacity:.92;margin-top:2px}
  .hbtns{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .infobtn{
    background:none;border:none;padding:0;margin:0;color:#fff;opacity:.9;
    cursor:pointer;display:flex;align-items:center;line-height:0;
  }
  .infobtn:active{opacity:.6}
  .langbtn{
    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
    color:#fff;border-radius:8px;padding:6px 11px;font-size:13px;font-weight:600;
    cursor:pointer;flex-shrink:0;
  }
  main{padding:14px;max-width:560px;margin:0 auto}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.04);
  }
  .status-hero{text-align:center;padding:22px 16px}
  .phase-badge{
    display:inline-block;font-size:13px;font-weight:700;letter-spacing:.02em;
    padding:5px 14px;border-radius:999px;margin-bottom:10px;
  }
  .phase-warm{background:var(--warm-bg);color:var(--warm)}
  .phase-cool{background:var(--cool-bg);color:var(--cool)}
  .phase-neutral{background:var(--neutral-bg);color:var(--neutral)}
  .bignum{font-size:46px;font-weight:800;line-height:1;margin:6px 0}
  .bignum small{font-size:18px;font-weight:600;color:var(--muted)}
  .anomunit{font-size:13px;font-weight:600;color:var(--muted);margin:-2px 0 2px;
    letter-spacing:.02em}
  .iodhead{text-align:center;margin:8px 0 2px}
  .iodnum{font-size:34px;font-weight:800;line-height:1;margin:6px 0}
  .iodhead .anomunit{text-align:center}
  .iodsrc{font-weight:400;color:var(--muted)}
  .phase-label{font-size:17px;font-weight:700;margin-top:4px}
  .phase-desc{font-size:13px;color:var(--muted);margin-top:8px}
  .strength{font-size:13px;font-weight:600;margin-top:6px}
  .verdict{display:flex;align-items:center;justify-content:center;gap:8px;
    margin:20px -16px -22px;padding:13px 16px;font-size:14px;font-weight:700;
    line-height:1.35;border-top:1px solid;
    border-bottom-left-radius:14px;border-bottom-right-radius:14px}
  .verdict-i{font-size:17px;flex-shrink:0}
  .verdict-warm{background:#fef7ed;color:#9a3412;border-top-color:#fed7aa}
  .verdict-cool{background:#eff6ff;color:#1d4ed8;border-top-color:#bfdbfe}
  .verdict-neutral{background:#f1f5f9;color:#475569;border-top-color:#e2e8f0}
  .seas-plain{opacity:.85;font-size:11px}
  .k-sub{font-size:10px;color:#64748b;font-weight:400}
  .cardtitle{font-size:14px;font-weight:700;margin:0 0 10px;display:flex;
    align-items:center;gap:7px}
  .cardtitle .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .cardhint{font-size:11px;color:var(--muted);margin:-4px 0 10px;line-height:1.55}
  .card.stale .v{color:#94a3b8 !important}
  .stalebanner{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
    padding:9px 11px;margin:0 0 10px;font-size:11.5px;line-height:1.55;color:#92400e}
  .stalebanner b{font-size:12.5px}
  .staledbg{font-family:monospace;font-size:10px;opacity:.8;display:inline-block;margin-top:4px}
  .offlinebar{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;
    padding:10px 14px;margin-bottom:12px;text-align:center;font-size:13px;
    font-weight:600;color:#92400e}
  .offlinebar span{display:block;font-size:11px;font-weight:400;margin-top:3px;opacity:.85}
  .iodage{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 11px;
    margin:10px 0 0;font-size:11.5px;line-height:1.5;color:#92400e}
  .iodfail{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:11px 13px;
    margin:8px 0 0;font-size:12px;line-height:1.55;color:#b91c1c}
  /* ---- Info-guide overlay (full-screen, toggled) ---- */
  .help-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);
    z-index:200;display:none;align-items:flex-end;justify-content:center}
  .help-overlay.show{display:flex}
  .help-panel{background:var(--card);width:100%;max-width:560px;
    max-height:92vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;
    overflow:hidden;box-shadow:0 -4px 24px rgba(15,23,42,.2)}
  .help-panel-head{display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);
    font-size:15px;font-weight:700;color:#0c4a6e;flex-shrink:0;
    background:var(--card)}
  .help-x{background:#f1f5f9;border:1px solid var(--line);border-radius:8px;
    width:32px;height:32px;font-size:15px;color:#0c4a6e;cursor:pointer;
    flex-shrink:0;line-height:1}
  .help-x:active{background:#e2e8f0}
  .help-panel-body{overflow-y:auto;padding:6px 16px 24px;-webkit-overflow-scrolling:touch}
  .help.help-panel-body > p{font-size:13px;line-height:1.6;margin:10px 0;color:var(--ink)}
  .help .hl-warm{color:#991b1b} .help .hl-cool{color:#1e40af}
  .help .hl-neutral{color:#475569}
  .help .nowline{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;
    padding:11px 12px;color:#0c4a6e;margin-top:14px}
  .help .helpdiv{height:1px;background:var(--line);margin:14px 0 4px}
  .help .helpnote{background:#f8fafc;border:1px solid var(--line);border-left:3px solid #94a3b8;
    border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.6;color:#475569;margin:8px 0}
  .help .iodcredit{background:#f0fdf4;border:1px solid #bbf7d0;border-left:3px solid #16a34a;
    border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.6;color:#166534;margin:8px 0}
  .help .maptitle{font-size:13px;font-weight:700;color:#0c4a6e;margin:14px 0 6px}
  .help .mapwrap{background:#f8fafc;border:1px solid var(--line);border-radius:10px;
    padding:8px}
  .help .ninomap{display:block;width:100%;height:auto}
  .help .outlook{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;
    padding:11px 12px;margin-top:10px}
  .help .outlook-h{font-size:12px;font-weight:700;color:#92400e;margin-bottom:6px}
  .help .outlook p{font-size:12px;line-height:1.6;color:#78350f;margin:0 0 8px}
  .help .outlook a{font-size:12px;color:#0e7490;text-decoration:none;font-weight:600}
  .row{display:flex;justify-content:space-between;align-items:baseline;
    padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted)}
  .row .v{font-weight:700;font-variant-numeric:tabular-nums}
  .v.warm{color:var(--warm)} .v.cool{color:var(--cool)} .v.neutral{color:var(--ink)}
  .spark{display:flex;align-items:flex-end;gap:3px;height:60px;margin:8px 0 2px}
  .bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;position:relative}
  .axis-row{display:flex;gap:3px;margin-top:4px}
  .axis-row span{flex:1;display:flex;flex-direction:column;align-items:center;
    line-height:1.25;white-space:nowrap}
  .axis-row b{font-size:9px;font-weight:600;color:var(--muted)}
  .axis-row i{font-size:8px;font-style:normal;color:#64748b}
  .farm{background:linear-gradient(135deg,#fffbeb,#fef3c7);
    border-color:#fde68a}
  .farm .cardtitle .dot{background:#d97706}
  .farm p{font-size:13px;margin:6px 0;color:#78350f}
  .meta{font-size:11px;color:var(--muted);text-align:center;margin:4px 0 16px}
  .help .helpsrc{font-size:11px;color:var(--muted);line-height:1.7;
    margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .help .helpsrc a{color:#0e7490;text-decoration:none}
  .help .qrbox{text-align:center;margin-top:16px;padding-top:14px;
    border-top:1px solid var(--line)}
  .help .qrtitle{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:10px;
    font-family:inherit}
  .help .qrframe{display:inline-block;background:#fff;padding:10px;border-radius:10px;
    border:1px solid var(--line);width:160px;height:160px}
  .help .qrimg{display:block;width:100%;height:100%}
  .help .qrlink{display:block;margin-top:10px;font-size:12px;color:#0e7490;
    text-decoration:none;word-break:break-all;font-weight:400;font-family:inherit}
  .help .qrhint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;
    font-family:inherit}
  .help .helpclose{display:block;width:100%;margin-top:16px;padding:11px;
    background:#f1f5f9;color:#0c4a6e;border:1px solid var(--line);border-radius:10px;
    font-size:13px;font-weight:600;cursor:pointer}
  .help .helpclose:active{background:#e2e8f0}
  .loading{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px}
  .spinner{width:28px;height:28px;border:3px solid var(--line);
    border-top-color:#0e7490;border-radius:50%;margin:0 auto 12px;
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;
    border-radius:12px;padding:14px;font-size:13px;margin-bottom:12px}
  .err b{display:block;margin-bottom:4px}
  .btn{display:block;width:100%;background:#0e7490;color:#fff;border:none;
    border-radius:10px;padding:12px;font-size:14px;font-weight:600;
    cursor:pointer;margin-top:8px}
  .btn.ghost{background:#f1f5f9;color:#0f172a;border:1px solid var(--line)}
  .legend{display:flex;gap:14px;justify-content:center;font-size:11px;
    color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;
    margin-right:4px;vertical-align:middle}
  .boot{position:fixed;inset:0;background:linear-gradient(135deg,#0c4a6e,#0e7490);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;z-index:99}
  .boot h2{font-size:20px;margin:14px 0 4px}.boot p{font-size:13px;opacity:.8}
</style>
</head>
<body>
<div class="boot" id="boot">
  <div class="spinner" style="border-top-color:#fff"></div>
  <h2>厄尔尼诺/拉尼娜监测</h2>
  <p>ENSO Monitor</p>
</div>

<header>
  <div class="htop">
    <div>
      <h1 id="t-title">厄尔尼诺/拉尼娜监测</h1>
      <div class="sub" id="t-sub">RONI 指数 · 厄尔尼诺与拉尼娜</div>
    </div>
    <div class="hbtns">
      <button class="infobtn" id="infobtn" onclick="openHelp()" aria-label="info">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="7.5" r="0.6" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="langbtn" id="langbtn" onclick="toggleLang()">中</button>
    </div>
  </div>
</header>

<main id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="t-loading">正在载入 NOAA 数据…</div>
  </div>
</main>

<div class="help-overlay" id="helpoverlay" onclick="helpBackdrop(event)">
  <div class="help-panel">
    <div class="help-panel-head">
      <span id="helpoverlaytitle">这些数字是什么意思？</span>
      <button class="help-x" onclick="closeHelp()" aria-label="close">✕</button>
    </div>
    <div class="help-panel-body help" id="helpoverlaybody"></div>
  </div>
</div>

<script>
/* ===================== CONFIG ===================== */
// Set your deployed Cloudflare Worker URL here (no trailing slash).
// ---- Cloudflare Worker proxy URL (baked in, ready to deploy) ----
// This is the deployed enso-proxy Worker that fetches NOAA CPC files
// and adds CORS so this browser page can read them. The Worker source
// is included as a reference comment at the bottom of this file.
// To point at a different Worker, set window.ENSO_PROXY before this script,
// or just edit the URL below. No trailing slash, no ?feed parameter.
var PROXY = (typeof window!=='undefined' && window.ENSO_PROXY)
  ? window.ENSO_PROXY
  : 'https://enso-proxy.standphoto.workers.dev';

var THRESH = 0.5; // ±0.5 deg C ONI/RONI El Nino / La Nina threshold

/* ===================== I18N ===================== */
// Language cycle. Add 'ms' (BM) or 'ta' (Tamil) here later and the toggle
// keeps working — one tap advances to the next, label shows current language.
var LANG_CYCLE = ['zh','en'];
var LANG_LBL   = { zh:'中', en:'EN' };
var LANG = localStorage.getItem('enso-lang') || 'zh';
var HELP_STATE = null; // live values for the info-guide overlay, set in render()
var T = {
  title:      {zh:'厄尔尼诺/拉尼娜监测', en:'ENSO Monitor'},
  sub:        {zh:'RONI 指数 · 厄尔尼诺与拉尼娜', en:'RONI index · El Niño & La Niña'},
  loading:    {zh:'正在载入 NOAA 数据…', en:'Loading NOAA data…'},
  curStatus:  {zh:'当前状态', en:'Current status'},
  anomUnit:   {zh:'°C 距平', en:'°C anomaly'},
  roniTitle:  {zh:'RONI · 官方指数（季）', en:'RONI · official index (seasonal)'},
  weeklyTitle:{zh:'每周 Niño 3.4 海温距平', en:'Weekly Niño 3.4 SST anomaly'},
  trendTitle: {zh:'近 24 季趋势', en:'Last 24 seasons trend'},
  iodTitle:   {zh:'印度洋偶极 (IOD)', en:'Indian Ocean Dipole (IOD)'},
  iodHint:    {zh:'IOD = 印度洋东西两侧的海温差。对马来西亚的雨量影响很直接，尤其是东侧（靠近苏门答腊）。数据来自 BOM，每周更新。',
               en:'IOD = the east–west sea-temperature gradient across the Indian Ocean. It directly affects Malaysian rainfall, especially the eastern side (near Sumatra). From BOM, updated weekly.'},
  iodLatest:  {zh:'最新值 (IOD)', en:'Latest (IOD)'},
  iodSrc:     {zh:'数据来源', en:'Source'},
  iodFail:    {zh:'IOD 数值暂时无法取得。这通常只是数据源 (BOM) 改了网页措辞，属于正常情况——为避免误导，这里不显示过期或猜测的数值。厄尔尼诺数据照常运作。详情见上方 ⓘ 说明。',
               en:'IOD value temporarily unavailable. This usually just means the data source (BOM) reworded their page — it\'s expected. To avoid misleading you, no stale or guessed value is shown. The El Niño data is unaffected. See the ⓘ guide for details.'},
  iodPrev:    {zh:'上一月', en:'Previous month'},
  iodTrend:   {zh:'近三月走向', en:'3-month trend'},
  iodPos:     {zh:'正 IOD', en:'Positive IOD'},
  iodNeg:     {zh:'负 IOD', en:'Negative IOD'},
  iodNeu:     {zh:'IOD 中性', en:'IOD-neutral'},
  iodPosCond: {zh:'正 IOD 状态', en:'Positive IOD'},
  iodNegCond: {zh:'负 IOD 状态', en:'Negative IOD'},
  iodNeuCond: {zh:'IOD 中性', en:'IOD-neutral'},
  iodFarmPos: {zh:'正 IOD 通常让本区 偏少雨量、趋干。它常与厄尔尼诺同时出现、方向一致；两者同时偏干时旱情更重。但 IOD 也可能单独出现，所以即使 ENSO 中性也要留意：注意灌溉与火患。',
               en:'Positive IOD usually brings drier-than-normal rainfall to our region. It often coincides with El Niño and points the same dry way; when both align, dry spells are sharper. But IOD can also act on its own, so watch it even when ENSO is neutral: mind irrigation and fire risk.'},
  iodFarmNeg: {zh:'负 IOD 通常让本区 偏多雨量、早上多雨。它常与拉尼娜同时出现、方向一致；两者同时偏湿时雨水更多。但 IOD 也可能单独出现，所以即使 ENSO 中性也要留意：注意排水、根部病害，并安排好喷药与采收时段。',
               en:'Negative IOD usually brings wetter-than-normal rainfall and more morning rain to our region. It often coincides with La Niña and points the same wet way; when both align, rain is heavier. But IOD can also act on its own, so watch it even when ENSO is neutral: mind drainage, root disease, and time your spraying and harvesting carefully.'},
  iodFarmNeu: {zh:'IOD 中性 — 印度洋方向对雨量没有明显偏移，按常规管理即可，主要看上方 ENSO 与短期天气预报。',
               en:'IOD-neutral — the Indian Ocean adds no strong rainfall tilt; manage as usual and rely mainly on ENSO above and short-range forecasts.'},
  // ---- MJO (Madden–Julian Oscillation) ----
  mjoTitle:   {zh:'季内振荡 (MJO)', en:'Madden–Julian Oscillation (MJO)'},
  mjoHint:    {zh:'MJO = 一团增强降雨，每 30–60 天自西向东绕赤道移动。它落在我们头顶（第 3–5 位相）时，未来 1–2 周通常更湿、雷雨更多；走到对面时则偏干。比 ENSO／IOD 更短期，填补「未来一两周」的空档。数据：NOAA ROMI 指数，每日更新。',
               en:'MJO = a pulse of enhanced rain that travels east around the equator every 30–60 days. When it sits over us (phases 3–5), the next 1–2 weeks tend to be wetter with more thunderstorms; on the opposite side it tilts drier. Shorter-term than ENSO/IOD — it fills the "next week or two" gap. Data: NOAA ROMI index, daily.'},
  mjoPhaseLbl:{zh:'位相', en:'Phase'},
  mjoAmpLbl:  {zh:'振幅', en:'Amplitude'},
  mjoRegionLbl:{zh:'活跃位置', en:'Active over'},
  mjoUnit:    {zh:'位相 1–8 · 振幅（>1 才算活跃）', en:'phase 1–8 · amplitude (>1 = active)'},
  // amplitude states
  mjoWeakBadge:{zh:'MJO 弱／不活跃', en:'MJO weak / inactive'},
  mjoActiveBadge:{zh:'MJO 活跃', en:'MJO active'},
  mjoWeakNote:{zh:'目前 MJO 振幅 < 1，信号弱、不连贯——这段时间它对本区雨量没有清楚的推动。可暂时忽略，主要看 ENSO 与短期天气预报。',
               en:'MJO amplitude is currently < 1, so the signal is weak and incoherent — it gives no clear push to our rainfall right now. Safe to set aside for now; rely on ENSO and short-range forecasts.'},
  mjoStale:   {zh:'⚠️ MJO 数据似乎未更新（最新为 {d}，约 {n} 天前）。MJO 是每日数据，过期的数值无法反映当前状况，因此这里不显示位相判断或农事建议。可能是数据源暂时停更——ENSO 与 IOD 不受影响。',
               en:'⚠️ The MJO data appears not to be updating (latest is {d}, about {n} days ago). MJO is daily data, so an out-of-date value can\'t reflect current conditions — no phase reading or farm advice is shown here. The source may have paused updates; ENSO and IOD are unaffected.'},
  // wet/dry/transition meaning (only shown when active)
  mjoWet:     {zh:'本区趋湿', en:'wetter tilt for our region'},
  mjoDry:     {zh:'本区趋干', en:'drier tilt for our region'},
  mjoTrans:   {zh:'过渡位相', en:'transition phase'},
  // region names by phase
  mjoRegWHemAfr:{zh:'西半球／非洲', en:'W. Hemisphere / Africa'},
  mjoRegIndian: {zh:'印度洋', en:'Indian Ocean'},
  mjoRegMaritime:{zh:'海洋大陆（我们这里）', en:'Maritime Continent (us)'},
  mjoRegWPac:   {zh:'西太平洋', en:'Western Pacific'},

  helpMjo:    {zh:'🌀 季内振荡 (MJO)：一团增强降雨（雷雨云团），每 30–60 天自西向东绕赤道移动一圈，分成 8 个「位相」表示它此刻在地球哪个位置。第 3–5 位相 = 落在海洋大陆（含马来西亚）头顶 → 本区未来 1–2 周偏湿、雷雨多；第 7–8–1 位相 = 走到对面 → 本区偏干；第 2、6 位相为过渡。只有当「振幅 > 1」时 MJO 才算活跃、值得参考；< 1 时信号弱可忽略。MJO 比 ENSO／IOD 短得多——ENSO／IOD 看「这个季节」，MJO 看「未来一两周」，最贴近喷药、采收、农活的安排。注意：精确的位相—降雨对应会随季节略有移动，所以这是趋势参考，不是精确预报。',

/* ===================== PARSERS ===================== */
// RONI.ascii.txt / oni.ascii.txt : whitespace columns.
// RONI: SEAS YR ANOM      |  ONI: SEAS YR TOTAL ANOM
function parseSeasonal(text, anomCol){
  var lines = text.trim().split(/\r?\n/);
  var out = [];
  for (var i=1;i<lines.length;i++){
    var p = lines[i].trim().split(/\s+/);
    if (p.length < anomCol+1) continue;
    var seas = p[0], yr = p[1], anom = parseFloat(p[anomCol]);
    if (isNaN(anom)) continue;
    out.push({ seas:seas, yr:yr, anom:anom });
  }
  return out;
}
// dmi.had.long.data (NOAA PSL "standard" format): a header line "STARTYR ENDYR",
// then one row per year: "YEAR  jan feb mar ... dec" (12 monthly DMI values).
// Missing/future months are a flag like -999.0 (or -9999). Trailing lines after
// the data are footer/metadata. Returns valid months chronologically sorted, so
// the last element is the most recent real value.
function parseDMI(text){
  var lines = text.trim().split(/\r?\n/);
  var out = [];
  var MISSING = -90; // any value <= this is treated as the missing flag (-999, -9999)
  for (var i=0;i<lines.length;i++){
    var p = lines[i].trim().split(/\s+/);
    // A data row starts with a 4-digit year and has up to 12 monthly columns.
    if (!/^\d{4}$/.test(p[0])) continue;
    var year = parseInt(p[0],10);
    if (year < 1800 || year > 2100) continue; // skip header "1870 2026" line etc.
    for (var m=1; m<=12 && m<p.length; m++){
      var v = parseFloat(p[m]);
      if (isNaN(v) || v <= MISSING) continue; // skip missing months
      out.push({ year:year, month:m, val:v });
    }
  }
  // chronological order
  out.sort(function(a,b){ return (a.year-b.year) || (a.month-b.month); });
  return out;
}
// NOAA ROMI (Real-time OLR MJO Index): columns are
//   year month day hour pc1 pc2 amplitude
// No header, no phase column. To match the standard WH04/RMM phase convention
// (which our wet/dry mapping assumes), NOAA specifies: RMM1 = ROMI_PC2,
// RMM2 = -ROMI_PC1. The phase is then atan2(RMM2,RMM1) split into 8 sectors;
// amplitude is unchanged by the rotation. (Transform + sector boundaries were
// verified against WH04 canonical phase-sector centres before shipping.)
function parseMJO(text){
  if (!text) return null;
  var lines = text.trim().split(/\r?\n/);
  var last = null;
  for (var i=0;i<lines.length;i++){
    var p = lines[i].trim().split(/\s+/);
    if (p.length < 7) continue;
    if (!/^\d{4}$/.test(p[0])) continue;        // skip non-data lines
    var year=parseInt(p[0],10), mon=parseInt(p[1],10), day=parseInt(p[2],10);
    // p[3] is hour (ignored). PC1, PC2, amplitude:
    var pc1=parseFloat(p[4]), pc2=parseFloat(p[5]), amp=parseFloat(p[6]);
    if (!isFinite(amp) || Math.abs(pc1)>90 || Math.abs(pc2)>90) continue; // missing flag
    if (isNaN(year)||isNaN(mon)||isNaN(day)) continue;
    var rmm1 = pc2, rmm2 = -pc1;                 // ROMI -> RMM convention
    var phase = rmmPhaseOf(rmm1, rmm2);
    last = { year:year, month:mon, day:day, rmm1:rmm1, rmm2:rmm2, phase:phase, amp:amp };
  }
  return last; // latest valid row (file is chronological)
}
// Standard WH04 RMM phase from (RMM1,RMM2): the vector angle split into 8 sectors.
function rmmPhaseOf(rmm1, rmm2){
  var deg = Math.atan2(rmm2, rmm1) * 180/Math.PI;
  if (deg < 0) deg += 360;
  if (deg>=180 && deg<225) return 1;
  if (deg>=225 && deg<270) return 2;
  if (deg>=270 && deg<315) return 3;
  if (deg>=315 && deg<360) return 4;
  if (deg>=0   && deg<45)  return 5;
  if (deg>=45  && deg<90)  return 6;
  if (deg>=90  && deg<135) return 7;
  return 8; // 135-180
}
//  (A) SST+anomaly pairs (8 numbers): "20JUN2026  22.1 0.4  25.3 0.7  27.6 1.4  28.9 0.9"
//  (B) anomaly-only (4 numbers):      "20JUN2026  0.4  0.7  1.4  0.9"
// The parser detects which by counting numbers, so it works either way.
function parseWeekly(text){
  var lines = text.trim().split(/\r?\n/);
  var rows = [];
  for (var i=0;i<lines.length;i++){
    var ln = lines[i].trim();
    // data lines start with a date like 20JUN2026
    if (!/^\d{1,2}[A-Za-z]{3}\d{4}/.test(ln)) continue;
    var date = ln.match(/^\d{1,2}[A-Za-z]{3}\d{4}/)[0];
    var rest = ln.slice(date.length);
    // Extract every signed decimal individually. CPC sometimes glues a negative
    // anomaly onto its SST with no space (e.g. "23.4-0.4"), so a plain
    // whitespace split would lose columns. This regex pulls each number.
    var nums = rest.match(/-?\d+\.?\d*/g);
    if (!nums) continue;
    nums = nums.map(parseFloat);
    var n3, n34, n4;
    if (nums.length >= 8){
      // Format A: 4 region SST+anomaly pairs; anomalies at odd indices.
      n3 = nums[3]; n34 = nums[5]; n4 = nums[7];
    } else if (nums.length >= 4){
      // Format B: 4 anomalies only, in region order n12,n3,n34,n4.
      n3 = nums[1]; n34 = nums[2]; n4 = nums[3];
    } else {
      continue; // not a valid data row
    }
    rows.push({
      date:   date,
      ts:     weekTs(date),          // sortable timestamp
      nino3:  n3,
      nino34: n34,
      nino4:  n4,
    });
  }
  // Guarantee chronological order regardless of any trailing/footer lines,
  // so weekly[length-1] is always the genuine most-recent week.
  rows.sort(function(a,b){ return a.ts - b.ts; });
  return rows;
}

// Convert a CPC week date like "27JAN2021" into a sortable timestamp.
var MONTHS = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
function weekTs(d){
  var m = d.match(/^(\d{1,2})([A-Za-z]{3})(\d{4})$/);
  if (!m) return 0;
  var mon = MONTHS[m[2].toUpperCase()];
  if (mon === undefined) return 0;
  return new Date(parseInt(m[3],10), mon, parseInt(m[1],10)).getTime();
}

/* ===================== CLASSIFY ===================== */
function phaseOf(anom){
  if (anom >= THRESH) return 'warm';
  if (anom <= -THRESH) return 'cool';
  return 'neutral';
}
function strengthOf(anom){
  var a = Math.abs(anom);
  if (a < 0.5) return null;
  if (a < 1.0) return 'weak';
  if (a < 1.5) return 'moderate';
  if (a < 2.0) return 'strong';
  return 'verystrong';
}
// IOD phase from the DMI value. Standard thresholds: +/-0.4 deg C.
var IOD_THRESH = 0.4;
function iodPhaseOf(v){
  if (v >= IOD_THRESH) return 'pos';
  if (v <= -IOD_THRESH) return 'neg';
  return 'neu';
}
// Short month name in the current language for a 1-12 month number.
function monthName(m){
  var en = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (LANG === 'zh') return m + '月';
  return en[m-1] || ('M'+m);
}
// MJO interpretation. Amplitude < 1 = weak/inactive (no usable signal).
var MJO_ACTIVE = 1.0;
// Which geographic region the MJO convection sits over, by phase (1-8).
function mjoRegionKey(phase){
  if (phase===1)            return 'mjoRegWHemAfr'; // W Hemisphere / Africa
  if (phase===2||phase===3) return 'mjoRegIndian';  // Indian Ocean
  if (phase===4||phase===5) return 'mjoRegMaritime';// Maritime Continent (us)
  if (phase===6||phase===7) return 'mjoRegWPac';    // Western Pacific
  return 'mjoRegPac';                               // phase 8: Pacific
}
// Effect on OUR region (Maritime Continent / Malaysia), by phase.
// Robust core: phases 3-5 enhance rain here; 7-8-1 suppress; 2 & 6 transition.
// Only meaningful when amplitude >= 1 (checked by caller).
function mjoEffect(phase){
  if (phase===3||phase===4||phase===5) return 'wet';
  if (phase===7||phase===8||phase===1) return 'dry';
  return 'transition'; // 2 or 6
}
function fmt(n){ return (n>=0?'+':'') + n.toFixed(2); }
// Format a cache timestamp as a short local date+time for the offline banner.
function fmtCacheTime(ms){
  try {
    var d = new Date(ms);
    var pad = function(x){ return (x<10?'0':'')+x; };
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())
      +' '+pad(d.getHours())+':'+pad(d.getMinutes());
  } catch(e){ return ''; }
}

/* ===================== DYNAMIC SITUATION TEXT ===================== */
// Builds the "right now" sentence entirely from the live numbers:
// the official RONI phase/strength, the latest weekly Nino 3.4, and the
// direction of travel. No forecast is invented here — the forward-looking
// NOAA outlook is a separate, clearly-labelled line (see helpOutlook).
function situationText(phase, strength, t3, roniVal, wkVal){
  var L = LANG;
  // 1) Headline state from official RONI
  var stateZh, stateEn;
  if (phase==='warm'){
    stateZh = '目前处于 厄尔尼诺' + (strength?'（'+tr(strength)+'）':'') + '，官方 RONI = '+fmt(roniVal)+'°C';
    stateEn = 'Currently El Niño' + (strength?' ('+tr(strength)+')':'') + ', official RONI = '+fmt(roniVal)+'°C';
  } else if (phase==='cool'){
    stateZh = '目前处于 拉尼娜' + (strength?'（'+tr(strength)+'）':'') + '，官方 RONI = '+fmt(roniVal)+'°C';
    stateEn = 'Currently La Niña' + (strength?' ('+tr(strength)+')':'') + ', official RONI = '+fmt(roniVal)+'°C';
  } else {
    stateZh = '目前 中性（不偏冷也不偏暖），官方 RONI = '+fmt(roniVal)+'°C';
    stateEn = 'Currently Neutral (neither warm nor cool), official RONI = '+fmt(roniVal)+'°C';
  }
  // 2) Direction of travel from the 3-season RONI trend
  var dirZh, dirEn;
  if (t3==='rising'){ dirZh='，并在 升温'; dirEn=', and warming'; }
  else if (t3==='falling'){ dirZh='，并在 降温'; dirEn=', and cooling'; }
  else { dirZh='，大致 平稳'; dirEn=', roughly steady'; }
  // 3) Latest weekly pulse — note if it disagrees with the slower seasonal state
  var wkPhase = phaseOf(wkVal);
  var pulseZh, pulseEn;
  if (wkPhase !== phase){
    // weekly leading the seasonal average — the telltale of a transition
    var leanZh = wkPhase==='warm'?'偏暖':wkPhase==='cool'?'偏冷':'中性';
    var leanEn = wkPhase==='warm'?'warm':wkPhase==='cool'?'cool':'neutral';
    pulseZh = '。最新一周的 Niño 3.4 = '+fmt(wkVal)+'°C（'+leanZh+'），比季节平均更快反映变化 — 这通常是 过渡期 的信号';
    pulseEn = '. The latest week\u2019s Niño 3.4 = '+fmt(wkVal)+'°C ('+leanEn+'), moving ahead of the seasonal average — usually a sign of a transition in progress';
  } else {
    pulseZh = '。最新一周的 Niño 3.4 = '+fmt(wkVal)+'°C，与季节状态一致';
    pulseEn = '. The latest week\u2019s Niño 3.4 = '+fmt(wkVal)+'°C, consistent with the seasonal state';
  }
  // 4) Plain farm takeaway tied to the OBSERVED phase (no forecast)
  var farmZh, farmEn;
  if (phase==='warm' || (phase==='neutral' && wkPhase==='warm')){
    farmZh = '。对果园：注意 偏干、防火、灌溉，留意花期窗口';
    farmEn = '. For the orchard: watch for drier conditions, fire risk, irrigation, and flowering windows';
  } else if (phase==='cool' || (phase==='neutral' && wkPhase==='cool')){
    farmZh = '。对果园：注意 偏湿、排水、根部病害';
    farmEn = '. For the orchard: watch for wetter conditions, drainage, and root disease';
  } else {
    farmZh = '。对果园：雨量接近常年，按常规季候管理';
    farmEn = '. For the orchard: rainfall near normal, manage by the usual seasonal calendar';
  }
  return (L==='zh')
    ? (stateZh + dirZh + pulseZh + farmZh + '。')
    : (stateEn + dirEn + pulseEn + farmEn + '.');
}

// Short, always-visible "second doctor" verdict under the big number.
// Uses the OBSERVED phase, and lets the weekly pulse tip a neutral state
// toward its leaning side (that's the real, actionable signal for a farmer).
// Returns {icon, text} in the active language. No forecast — observed only.
function plainVerdict(phase, wkPhase){
  var lean = phase;
  if (phase === 'neutral' && wkPhase !== 'neutral') lean = wkPhase; // transition tip
  if (lean === 'warm'){
    return { icon:'☀️', cls:'verdict-warm',
      text: (LANG==='zh')
        ? '偏干 — 准备灌溉、留意火患与花期'
        : 'Leaning drier — prepare irrigation, watch fire risk & flowering' };
  }
  if (lean === 'cool'){
    return { icon:'🌧️', cls:'verdict-cool',
      text: (LANG==='zh')
        ? '偏湿 — 注意排水与根部病害'
        : 'Leaning wetter — watch drainage & root disease' };
  }
  return { icon:'⚖️', cls:'verdict-neutral',
    text: (LANG==='zh')
      ? '雨量接近常年 — 按常规管理'
      : 'Rainfall near normal — manage as usual' };
}

// Expand a 3-letter season code (e.g. "MAM") to plain month names so the
// label carries its own meaning without needing the help card.
var SEAS_MONTHS = {
  DJF:['12','1','2'], JFM:['1','2','3'], FMA:['2','3','4'], MAM:['3','4','5'],
  AMJ:['4','5','6'], MJJ:['5','6','7'], JJA:['6','7','8'], JAS:['7','8','9'],
  ASO:['8','9','10'], SON:['9','10','11'], OND:['10','11','12'], NDJ:['11','12','1']
};
var MON_EN = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function seasonPlain(code){
  var m = SEAS_MONTHS[code];
  if (!m) return '';
  if (LANG==='zh') return m[0]+'-'+m[1]+'-'+m[2]+'月';
  return MON_EN[+m[0]]+'-'+MON_EN[+m[1]]+'-'+MON_EN[+m[2]];
}

// Builds the IOD card from the Worker's BOM scrape result {ok,value,asOf}.
// FAILS LOUD: if the scrape is unavailable, or the value is too old, the card
// shows a clear "needs updating" notice instead of any stale/guessed number
// and instead of any rainfall advice. Returns '' only when there's no IOD
// object at all (e.g. very first load offline with no cache).
function iodCard(iod){
  if (!iod) return '';
  // --- Failure guard: scrape broke (regex missed, BOM down, etc.) ---
  if (!iod.ok || typeof iod.value !== 'number') {
    return '<div class="card">'
      +'<div class="cardtitle"><span class="dot"></span>'+tr('iodTitle')+'</div>'
      +'<div class="cardhint">'+tr('iodHint')+'</div>'
      +'<div class="iodfail">'+tr('iodFail')+'</div>'
    +'</div>';
  }
  var v = iod.value;
  var p = iodPhaseOf(v);
  var pClass = p==='pos' ? 'warm' : p==='neg' ? 'cool' : 'neutral';
  var phaseLbl = p==='pos' ? tr('iodPosCond') : p==='neg' ? tr('iodNegCond') : tr('iodNeuCond');
  var badgeCls = p==='pos' ? 'phase-warm' : p==='neg' ? 'phase-cool' : 'phase-neutral';
  var col = p==='pos' ? 'var(--warm)' : p==='neg' ? 'var(--cool)' : 'var(--ink)';
  var asOfTs = iod.asOf ? bomDateTs(iod.asOf) : 0;
  var tooOld = asOfTs > 0 && (Date.now() - asOfTs) > 35*24*3600*1000;
  var asOfTxt = iod.asOf ? iod.asOf : '';

  var html = '<div class="card">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('iodTitle')+'</div>'
    +'<div class="cardhint">'+tr('iodHint')+'</div>'
    +'<div class="iodhead">'
      +'<span class="phase-badge '+badgeCls+'">'+phaseLbl+'</span>'
      +'<div class="iodnum" style="color:'+col+'">'+fmt(v)+'</div>'
      +'<div class="anomunit">'+tr('iodUnit')+'</div>'
    +'</div>';
  if (tooOld) {
    // Value present but the source date is stale — flag it (advice withheld
    // in the orchard card too).
    html += '<div class="iodage">'+tr('iodAged').replace('{m}', asOfTxt)+'</div>';
  }
  html += '<div class="row" style="margin-top:8px"><span class="k">'+tr('iodLatest')+'</span><span class="v '+pClass+'">'+(asOfTxt?asOfTxt+' · ':'')+fmt(v)+'</span></div>'
    +'<div class="row"><span class="k">'+tr('iodSrc')+'</span><span class="v iodsrc">BOM</span></div>'
  +'</div>';
  return html;
}
// Returns the IOD orchard-advice line for the "what it means" card, or '' if
// IOD is unavailable/stale (so we never give advice off bad data).
function iodFarmLine(iod){
  if (!iod || !iod.ok || typeof iod.value !== 'number') return '';
  var asOfTs = iod.asOf ? bomDateTs(iod.asOf) : 0;
  if (asOfTs > 0 && (Date.now() - asOfTs) > 35*24*3600*1000) return ''; // stale
  var p = iodPhaseOf(iod.value);
  return p==='pos' ? tr('iodFarmPos') : p==='neg' ? tr('iodFarmNeg') : tr('iodFarmNeu');
}
// Parse a BOM date like "14 June 2026" or "3 May" (no year) into a timestamp.
// If the year is missing, assume the most recent past occurrence.
function bomDateTs(s){
  var MO={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,
          september:8,october:9,november:10,december:11};
  var m = s.match(/(\d{1,2})\s+([A-Za-z]+)(?:\s+(\d{4}))?/);
  if (!m) return 0;
  var day = parseInt(m[1],10);
  var mon = MO[m[2].toLowerCase()];
  if (mon === undefined) return 0;
  var now = new Date();
  var year = m[3] ? parseInt(m[3],10) : now.getFullYear();
  var ts = new Date(year, mon, day).getTime();
  // If no year was given and the date is in the future, it's last year's.
  if (!m[3] && ts > now.getTime()) ts = new Date(year-1, mon, day).getTime();
  return ts;
}

// Builds the MJO card from a parsed RMM row {phase,amp,...}. Shows phase,
// amplitude, the region the MJO sits over, and the plain wet/dry meaning for
// our region. When amplitude < 1 the MJO is inactive: we say so and give no
// rain advice. Returns '' if no MJO data (keeps the rest of the app working).
function mjoCard(mjo){
  if (!mjo) return '';
  // Staleness guard: MJO is DAILY data. If the latest row is well behind today,
  // the source has stopped updating (or lags) — do NOT present old data as
  // "right now". Show the value but flag it and withhold rain advice. Same
  // discipline as the IOD guard: never stale data dressed up as current.
  var dataTs = new Date(mjo.year, mjo.month-1, mjo.day).getTime();
  var ageDays = Math.floor((Date.now() - dataTs) / (24*3600*1000));
  var stale = ageDays > 10;
  var dateTxt = monthName(mjo.month)+' '+mjo.day+', '+mjo.year;

  if (stale){
    // Old data — show it honestly as out of date, no phase advice, no wet/dry.
    return '<div class="card">'
      +'<div class="cardtitle"><span class="dot"></span>'+tr('mjoTitle')+'</div>'
      +'<div class="cardhint">'+tr('mjoHint')+'</div>'
      +'<div class="iodfail">'+tr('mjoStale').replace('{d}', dateTxt).replace('{n}', ageDays)+'</div>'
      +'<div class="row" style="margin-top:8px"><span class="k">'+tr('mjoNowLabel').replace(/[:：]\s*$/,'')+'</span><span class="v" style="font-weight:400;color:var(--muted)">'+dateTxt+'</span></div>'
      +'<div class="row"><span class="k">'+tr('iodSrc')+'</span><span class="v iodsrc">NOAA</span></div>'
    +'</div>';
  }

  var active = mjo.amp >= MJO_ACTIVE;
  var eff = mjoEffect(mjo.phase); // wet/dry/transition
  var badgeCls, badgeLbl, col;
  if (!active){
    badgeCls='phase-neutral'; badgeLbl=tr('mjoWeakBadge'); col='var(--ink)';
  } else if (eff==='wet'){
    badgeCls='phase-cool'; badgeLbl=tr('mjoActiveBadge'); col='var(--cool)';
  } else if (eff==='dry'){
    badgeCls='phase-warm'; badgeLbl=tr('mjoActiveBadge'); col='var(--warm)';
  } else {
    badgeCls='phase-neutral'; badgeLbl=tr('mjoActiveBadge'); col='var(--ink)';
  }
  var meaning = !active ? '' :
    (eff==='wet'?tr('mjoWet'):eff==='dry'?tr('mjoDry'):tr('mjoTrans'));

  var html = '<div class="card">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('mjoTitle')+'</div>'
    +'<div class="cardhint">'+tr('mjoHint')+'</div>'
    +'<div class="iodhead">'
      +'<span class="phase-badge '+badgeCls+'">'+badgeLbl+'</span>'
      +'<div class="iodnum" style="color:'+col+'">'+mjo.phase+'<span style="font-size:18px;font-weight:600;color:var(--muted)"> · '+mjo.amp.toFixed(2)+'</span></div>'
      +'<div class="anomunit">'+tr('mjoUnit')+'</div>'
    +'</div>';
  if (!active){
    html += '<div class="iodage">'+tr('mjoWeakNote')+'</div>';
  } else if (meaning){
    var mc = eff==='wet'?'cool':eff==='dry'?'warm':'';
    html += '<div class="row" style="margin-top:8px"><span class="k">'+tr('mjoRegionLbl')+'</span><span class="v">'+tr(mjoRegionKey(mjo.phase))+'</span></div>'
      +'<div class="row"><span class="k">'+tr('mjoPhaseLbl')+' · '+tr('mjoAmpLbl')+'</span><span class="v '+mc+'">'+tr(eff==='wet'?'mjoWet':eff==='dry'?'mjoDry':'mjoTrans')+'</span></div>';
  }
  html += '<div class="row"><span class="k">'+tr('mjoNowLabel').replace(/[:：]\s*$/,'')+'</span><span class="v" style="font-weight:400;color:var(--muted)">'+dateTxt+'</span></div>'
    +'<div class="row"><span class="k">'+tr('iodSrc')+'</span><span class="v iodsrc">NOAA</span></div>'
  +'</div>';
  return html;
}
// MJO orchard-advice line for the "what it means" card, or '' if inactive,
// stale, or absent (never advice off old data).
function mjoFarmLine(mjo){
  if (!mjo) return '';
  var dataTs = new Date(mjo.year, mjo.month-1, mjo.day).getTime();
  if ((Date.now() - dataTs) / (24*3600*1000) > 10) return ''; // stale -> no advice
  if (mjo.amp < MJO_ACTIVE) return tr('mjoFarmWeak');
  var eff = mjoEffect(mjo.phase);
  var key = eff==='wet'?'mjoFarmWet':eff==='dry'?'mjoFarmDry':'mjoFarmTrans';
  return tr(key).replace('{p}', mjo.phase);
}

// MJO phase wheel: the standard 8-phase RMM diagram. Highlights the current
// phase, marks the Maritime Continent (phases 4-5, "us"), and plots the
// current (RMM1,RMM2) point. mjo = parsed row or null.
function mjoWheel(mjo){  var t = function(k){ return tr(k); };
  var cx=130, cy=132, R=92, rIn=26;
  function pol(ang,r){ var a=ang*Math.PI/180; return [cx+r*Math.cos(a), cy - r*Math.sin(a)]; }
  function wedge(a0,a1,fill){
    var p0=pol(a0,rIn), p1=pol(a0,R), p2=pol(a1,R), p3=pol(a1,rIn);
    return '<path d="M'+p0[0].toFixed(1)+' '+p0[1].toFixed(1)
      +'L'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)
      +'A'+R+' '+R+' 0 0 0 '+p2[0].toFixed(1)+' '+p2[1].toFixed(1)
      +'L'+p3[0].toFixed(1)+' '+p3[1].toFixed(1)
      +'A'+rIn+' '+rIn+' 0 0 1 '+p0[0].toFixed(1)+' '+p0[1].toFixed(1)
      +'Z" fill="'+fill+'" stroke="#cbd5e1" stroke-width="0.7"/>';
  }
  // phase -> [startAngle,endAngle] in math degrees (CCW), WH04 convention
  var PH={1:[180,225],2:[225,270],3:[270,315],4:[315,360],5:[0,45],6:[45,90],7:[90,135],8:[135,180]};
  var cur = mjo ? mjo.phase : 0;
  var active = mjo && mjo.amp>=1;
  // viewBox tall enough for the bottom region label to sit clear of the edge
  var svg='<svg viewBox="0 0 260 268" class="ninomap" role="img" aria-label="MJO phase wheel">';
  for (var ph=1; ph<=8; ph++){
    var a=PH[ph];
    var fill='#f1f5f9';
    if (ph===4||ph===5) fill='#fef9c3';                 // Maritime band (us)
    if (ph===cur){
      var e=mjoEffect(ph);
      if (active){
        // strong: full effect colour
        fill = e==='wet'?'#bfdbfe':e==='dry'?'#fecaca':'#e2e8f0';
      } else {
        // weak: faint tint of the effect colour, so the current phase is still
        // legible without implying the MJO is strong.
        fill = e==='wet'?'#eff6ff':e==='dry'?'#fef2f2':'#f8fafc';
        if (ph===4||ph===5) fill='#fef9c3'; // keep Maritime tint if current+weak
      }
    }
    svg+=wedge(a[0],a[1],fill);
    var mid=(a[0]+a[1])/2, lp=pol(mid,(R+rIn)/2);
    svg+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+3).toFixed(1)+'" font-size="10" font-weight="bold" fill="#475569" text-anchor="middle">'+ph+'</text>';
  }
  // amplitude=1 inner circle (the "active" threshold). Label sits on its lower
  // rim (not dead-center) so the plotted point never collides with the text.
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rIn+'" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 2"/>';
  svg+='<text x="'+cx+'" y="'+(cy+rIn-5)+'" font-size="7" fill="#94a3b8" text-anchor="middle">amp 1</text>';
  // region labels around the ring
  svg+='<text x="'+cx+'" y="20" font-size="8.5" fill="#64748b" text-anchor="middle">'+t('mjoRegWPac')+'</text>';
  svg+='<text x="'+cx+'" y="258" font-size="8.5" font-weight="bold" fill="#a16207" text-anchor="middle">'+t('mjoRegMaritime')+'</text>';
  svg+='<text x="6" y="'+(cy+3)+'" font-size="8.5" fill="#64748b" text-anchor="start">'+t('mjoRegIndian')+'</text>';
  svg+='<text x="254" y="'+(cy+3)+'" font-size="8.5" fill="#64748b" text-anchor="end">'+t('mjoRegPac')+'</text>';
  // plot current point: amplitude maps so amp=1 sits at the rIn ring, growing
  // outward toward R at amp~3. Weak MJO (<1) therefore sits inside the dashed
  // ring, which visually reads as "inactive".
  if (mjo){
    var rPlot = rIn + (mjo.amp - 1) * ((R - rIn) / 2); // amp1->rIn, amp3->R
    if (rPlot < 4) rPlot = 4;                           // keep off exact center
    if (rPlot > R) rPlot = R;
    // direction from the RMM vector angle
    var ang = Math.atan2(mjo.rmm2, mjo.rmm1); // radians, CCW from +x
    var px = cx + rPlot*Math.cos(ang), py = cy - rPlot*Math.sin(ang);
    // faint line from centre to the dot — shows which way the MJO points even
    // when the amplitude is small and the dot huddles near the middle.
    var lx = cx + (rPlot+6)*Math.cos(ang), ly = cy - (rPlot+6)*Math.sin(ang);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+lx.toFixed(1)+'" y2="'+ly.toFixed(1)+'" stroke="#0f766e" stroke-width="1.5" opacity="0.45"/>';
    svg+='<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="5" fill="#0f766e" stroke="#fff" stroke-width="1.5"/>';
  }
  svg+='</svg>';
  return svg;
}

/* ===================== FETCH ===================== */
function getFeed(name){
  // Append a timestamp so neither the browser nor the Worker's edge cache can
  // serve a stale copy — each load requests a unique URL.
  var bust = '&t=' + Date.now();
  return fetch(PROXY + '?feed=' + name + bust, {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error(name+' '+r.status); return r.text(); });
}

function load(){
  var app = document.getElementById('app');
  app.innerHTML = '<div class="loading" id="loading"><div class="spinner"></div><div>'
    + tr('loading') + '</div></div>';
  // IOD and MJO are bonus feeds: if either fails we still show ENSO. Their
  // fetches never reject the whole Promise.all — they resolve to null on failure.
  var iodFeed = getFeed('iod').catch(function(){ return null; });
  var mjoFeed = getFeed('mjo').catch(function(){ return null; });
  Promise.all([ getFeed('roni'), getFeed('weekly'), iodFeed, mjoFeed ])
    .then(function(res){
      var roni = parseSeasonal(res[0], 2);   // RONI anom in col 2
      var weekly = parseWeekly(res[1]);
      if (!roni.length || !weekly.length) throw new Error('empty parse');
      // IOD comes back as JSON {ok,value,asOf} from the Worker's BOM scrape.
      var iod = parseIod(res[2]);
      var mjo = parseMJO(res[3]);
      // Save the fresh feeds so the app can show them next time it's offline.
      try {
        localStorage.setItem('enso-cache', JSON.stringify({
          roni: res[0], weekly: res[1], iod: res[2] || '', mjo: res[3] || '', at: Date.now()
        }));
      } catch(e){ /* storage full or blocked — ignore */ }
      render(roni, weekly, null, iod, mjo);
    })
    .catch(function(e){
      // Fetch failed (likely offline). Fall back to the last-saved data.
      var raw = null;
      try { raw = JSON.parse(localStorage.getItem('enso-cache') || 'null'); } catch(_){}
      if (raw && raw.roni && raw.weekly) {
        var roni = parseSeasonal(raw.roni, 2);
        var weekly = parseWeekly(raw.weekly);
        var iod = parseIod(raw.iod);
        var mjo = parseMJO(raw.mjo);
        if (roni.length && weekly.length) { render(roni, weekly, raw.at, iod, mjo); return; }
      }
      renderError(e); // no cache to fall back on
    });
}
// Parse the Worker's IOD JSON. Returns {ok,value,asOf} on success, or
// {ok:false} on any problem — the card uses ok:false to show a loud notice.
function parseIod(text){
  if (!text) return { ok:false };
  try {
    var o = (typeof text === 'string') ? JSON.parse(text) : text;
    if (o && o.ok === true && typeof o.value === 'number') {
      return { ok:true, value:o.value, asOf:o.asOf || null };
    }
    return { ok:false, reason:(o && o.reason) || 'no data' };
  } catch(e){ return { ok:false, reason:'bad json' }; }
}

/* ===================== RENDER ===================== */
function render(roni, weekly, cachedAt, iod, mjo){
  var latest = roni[roni.length-1];
  var prev   = roni[roni.length-2] || latest;
  var phase  = phaseOf(latest.anom);
  var strength = strengthOf(latest.anom);

  // 3-season trend
  var t3 = 'steady';
  if (roni.length>=3){
    var d = latest.anom - roni[roni.length-3].anom;
    if (d > 0.1) t3='rising'; else if (d < -0.1) t3='falling';
  }

  var wkLatest = weekly[weekly.length-1];
  var wkPrev   = weekly[weekly.length-2] || wkLatest;

  // Staleness guard: how many weeks behind today is the latest weekly row?
  // CPC updates weekly (Mondays); >3 weeks behind signals a stalled feed or
  // an outdated deployed file. weekTs() gives a ms timestamp from the date.
  var wkAgeWeeks = 0, wkStale = false;
  if (wkLatest.ts){
    wkAgeWeeks = Math.floor((Date.now() - wkLatest.ts) / (7*24*3600*1000));
    wkStale = wkAgeWeeks >= 3;
  }
  // Diagnostic: what did the parser actually receive? Shown only when stale,
  // so we can tell a bad feed (few/old rows) from an app bug.
  var wkDebug = weekly.length + ' rows · ' + weekly[0].date + ' → ' + wkLatest.date;

  var phaseClass = 'phase-'+phase;
  var phaseLabel = phase==='warm'?tr('elnino'):phase==='cool'?tr('lanina'):tr('neutral');
  var phaseCond  = phase==='warm'?tr('elninoCond'):phase==='cool'?tr('laninaCond'):tr('neutralCond');
  var vClass = phase==='warm'?'warm':phase==='cool'?'cool':'neutral';
  var strengthTxt = strength ? tr(strength)+' · '+phaseLabel : tr('neutral');
  var farmKey = phase==='warm'?'farmWarm':phase==='cool'?'farmCool':'farmNeutral';

  // Live, data-driven "right now" sentence (observed state only).
  var nowTxt = situationText(phase, strength, t3, latest.anom, wkLatest.nino34);
  // Stash the inputs so the info-guide overlay can regenerate this live text
  // (and in the current language) whenever it is opened.
  HELP_STATE = { phase:phase, strength:strength, t3:t3,
                 roni:latest.anom, wk:wkLatest.nino34, iod:iod, mjo:mjo };
  // Always-visible plain verdict for the hero (the 2-second takeaway).
  var verdict = plainVerdict(phase, phaseOf(wkLatest.nino34));

  // spark: last 24 seasons
  var hist = roni.slice(-24);
  var maxAbs = Math.max(1.0, Math.max.apply(null, hist.map(function(h){return Math.abs(h.anom);})));
  var bars = hist.map(function(h){
    var hpx = Math.max(2, Math.round(Math.abs(h.anom)/maxAbs*54));
    var col = h.anom>=THRESH?'#dc2626':h.anom<=-THRESH?'#2563eb':'#cbd5e1';
    var up = h.anom>=0;
    return '<div class="bar" style="height:'+hpx+'px;background:'+col+';align-self:'
      +(up?'flex-end':'flex-start')+'" title="'+h.seas+' '+h.yr+': '+fmt(h.anom)+'"></div>';
  }).join('');
  var axisLabels = hist.map(function(h,i){
    return '<span>'+(i%4===0?('<b>'+h.seas+'</b><i>\u2019'+h.yr.slice(2)+'</i>'):'')+'</span>';
  }).join('');

  var html =
  (cachedAt
    ? '<div class="offlinebar">'+tr('offlineCache')

    +'<div class="anomunit">'+tr('anomUnit')+'</div>'
    +(strength?'<div class="strength" style="color:'+(phase==='warm'?'var(--warm)':'var(--cool)')+'">'+strengthTxt+'</div>':'')
    +'<div class="phase-desc">RONI · '+latest.seas+' '+latest.yr+' <span class="seas-plain">('+seasonPlain(latest.seas)+')</span></div>'

  +'<div class="card">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('roniTitle')+'</div>'
    +'<div class="cardhint">'+tr('helpRoni')+'</div>'
    +'<div class="row"><span class="k">'+tr('latestSeason')+'<br><span class="k-sub">'+seasonPlain(latest.seas)+'</span></span><span class="v '+vClass+'">'+latest.seas+' '+latest.yr+' · '+fmt(latest.anom)+'</span></div>'
    +'<div class="row"><span class="k">'+tr('prevSeason')+'<br><span class="k-sub">'+seasonPlain(prev.seas)+'</span></span><span class="v">'+prev.seas+' '+prev.yr+' · '+fmt(prev.anom)+'</span></div>'
    +'<div class="row"><span class="k">'+tr('trend3')+'</span><span class="v">'+tr(t3)+'</span></div>'
  +'</div>'

  +'<div class="card'+(wkStale?' stale':'')+'">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('weeklyTitle')+'</div>'
    +'<div class="cardhint">'+tr('helpWeekly')+'</div>'
    +(wkStale
      ? '<div class="stalebanner"><b>'+tr('staleWarn')+'</b><br>'
        + tr('staleNote').replace('{n}', wkAgeWeeks)
        + '<br><span class="staledbg">'+wkDebug+'</span></div>'
      : '')
    +'<div class="row"><span class="k">'+tr('nino34')+' · '+tr('week')+' ('+wkLatest.date+')</span><span class="v '+(phaseOf(wkLatest.nino34))+'">'+fmt(wkLatest.nino34)+'°C</span></div>'
    +'<div class="row"><span class="k">'+tr('nino34')+' · '+tr('weekAgo')+'</span><span class="v">'+fmt(wkPrev.nino34)+'°C</span></div>'
    +'<div class="row"><span class="k">'+tr('nino3')+'</span><span class="v">'+fmt(wkLatest.nino3)+'°C</span></div>'
    +'<div class="row"><span class="k">'+tr('nino4')+'</span><span class="v">'+fmt(wkLatest.nino4)+'°C</span></div>'

  + iodCard(iod)
  + mjoCard(mjo)

  +'<div class="card">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('trendTitle')+'</div>'
    +'<div class="cardhint">'+tr('helpTrend')+'</div>'
    +'<div class="spark">'+bars+'</div>'
    +'<div class="axis-row">'+axisLabels+'</div>'
    +'<div class="legend">'
      +'<span><i style="background:#dc2626"></i>'+tr('elnino')+'</span>'
      +'<span><i style="background:#cbd5e1"></i>'+tr('neutral')+'</span>'
      +'<span><i style="background:#2563eb"></i>'+tr('lanina')+'</span>'
    +'</div>'
  +'</div>'

  +'<div class="card farm">'
    +'<div class="cardtitle"><span class="dot"></span>'+tr('farmTitle')+'</div>'
    +'<p><b>ENSO:</b> '+tr(farmKey)+'</p>'
    +(iodFarmLine(iod)
        ? '<p style="margin-top:9px"><b>IOD:</b> '+iodFarmLine(iod)+'</p>'
        : '')
    +(mjoFarmLine(mjo)
        ? '<p style="margin-top:9px"><b>MJO:</b> '+mjoFarmLine(mjo)+'</p>'
        : '')
    +'<p style="font-size:11px;color:#92400e;margin-top:10px">'+tr('disclaimer')+'</p>'
  +'</div>'

  +'<button class="btn ghost" onclick="load()">'+tr('refresh')+'</button>';

  document.getElementById('app').innerHTML = html;
}

function renderError(e){
  document.getElementById('app').innerHTML =
    '<div class="err"><b>'+tr('errTitle')+'</b>'+tr('errBody')
    +'<br><br><code style="font-size:11px;opacity:.7">'+String(e)+'</code></div>'
    +'<button class="btn" onclick="load()">'+tr('retry')+'</button>';
}

/* ===================== LANG ===================== */
function applyLang(){
  document.documentElement.lang = LANG;
  // Button always shows the language the UI is currently in.
  document.getElementById('langbtn').textContent = LANG_LBL[LANG];
  document.getElementById('t-title').textContent = tr('title');
  document.getElementById('t-sub').textContent = tr('sub');
}
function toggleLang(){
  // One tap: advance to the next language in the cycle and re-render.
  var i = LANG_CYCLE.indexOf(LANG);
  LANG = LANG_CYCLE[(i + 1) % LANG_CYCLE.length];
  localStorage.setItem('enso-lang', LANG);
  applyLang();
  load();
}

// Builds the info-guide inner HTML. Called fresh on each open so the live
// "right now" situation text reflects current data and language.
function helpContent(){
  var s = HELP_STATE;
  var nowTxt = s ? situationText(s.phase, s.strength, s.t3, s.roni, s.wk)
                 : '';
  // Live IOD "right now" line, only when we have a good current value.
  var iodNow = '';
  if (s && s.iod && s.iod.ok && typeof s.iod.value === 'number') {
    var ip = iodPhaseOf(s.iod.value);
    var iodPhraseKey = ip==='pos' ? 'iodNowPos' : ip==='neg' ? 'iodNowNeg' : 'iodNowNeu';
    iodNow = fmt(s.iod.value) + (s.iod.asOf ? ' ('+s.iod.asOf+') — ' : ' — ') + tr(iodPhraseKey);
  }
  // Live MJO "right now" line.
  var mjoNow = '';
  if (s && s.mjo) {
    var mjoTs = new Date(s.mjo.year, s.mjo.month-1, s.mjo.day).getTime();
    var mjoStaleDays = (Date.now() - mjoTs) / (24*3600*1000);
    if (mjoStaleDays > 10) {
      // stale — don't present old MJO as the current situation
      mjoNow = '';
    } else if (s.mjo.amp < 1) {
      mjoNow = tr('mjoPhaseLbl')+' '+s.mjo.phase+' · '+tr('mjoAmpLbl')+' '+s.mjo.amp.toFixed(2)+' — '+tr('mjoWeakBadge');
    } else {
      var me = mjoEffect(s.mjo.phase);
      mjoNow = tr('mjoPhaseLbl')+' '+s.mjo.phase+' ('+tr(mjoRegionKey(s.mjo.phase))+') · '+tr('mjoAmpLbl')+' '+s.mjo.amp.toFixed(2)+' — '+tr(me==='wet'?'mjoWet':me==='dry'?'mjoDry':'mjoTrans');
    }
  }
  return ''
    +'<p>'+tr('helpIntro')+'</p>'
    +'<p class="hl-warm">🔴 '+tr('helpElnino')+'</p>'
    +'<p class="hl-cool">🔵 '+tr('helpLanina')+'</p>'
    +'<p class="hl-neutral">⚪ '+tr('helpNeutral')+'</p>'
    +'<p>📊 '+tr('helpNumber')+'</p>'
    +'<p>🌡️ '+tr('helpAnomaly')+'</p>'
    +'<div class="helpdiv"></div>'
    +'<p>📅 '+tr('helpSeason')+'</p>'
    +'<p>🌊 '+tr('helpWhat34')+'</p>'
    +'<div class="maptitle">🗺️ '+tr('mapTitle')+'</div>'
    +'<div class="mapwrap">'+ninoMap()+'</div>'
    +(nowTxt?'<p class="nowline"><b>'+tr('helpNow')+'</b>'+nowTxt+'</p>':'')
    +'<div class="outlook">'
      +'<div class="outlook-h">🔭 '+tr('helpOutlookLabel')+'</div>'
      +'<p>'+tr('helpOutlookTxt')+'</p>'
      +'<a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank" rel="noopener">'+tr('helpOutlookCheck')+'</a>'
    +'</div>'
    // ---------- IOD section (parallel structure to ENSO above) ----------
    +'<div class="helpdiv"></div>'
    +'<p>'+tr('helpIod')+'</p>'
    +'<div class="maptitle">🗺️ '+tr('iodMapTitle')+'</div>'
    +'<div class="mapwrap">'+iodMap()+'</div>'
    +(iodNow?'<p class="nowline"><b>'+tr('iodNowLabel')+'</b>'+iodNow+'</p>':'')
    +'<div class="outlook">'
      +'<div class="outlook-h">🔭 '+tr('iodOutlookLabel')+'</div>'
      +'<p>'+tr('iodOutlookTxt')+'</p>'
      +'<a href="https://www.bom.gov.au/climate/iod/" target="_blank" rel="noopener">'+tr('iodOutlookCheck')+'</a>'
    +'</div>'
    +'<p class="helpnote">'+tr('helpIodNote')+'</p>'
    +'<p class="iodcredit">'+tr('iodCredit')+'</p>'
    // ---------- MJO section ----------
    +'<div class="helpdiv"></div>'
    +'<p>'+tr('helpMjo')+'</p>'
    +'<div class="maptitle">🌀 '+tr('mjoTitle')+'</div>'
    +'<div class="mapwrap">'+mjoWheel(s?s.mjo:null)+'</div>'
    +(mjoNow?'<p class="nowline"><b>'+tr('mjoNowLabel')+'</b>'+mjoNow+'</p>':'')
    +'<div class="outlook">'
      +'<div class="outlook-h">🔭 '+tr('mjoOutlookLabel')+'</div>'
      +'<p>'+tr('mjoOutlookTxt')+'</p>'
      +'<a href="https://psl.noaa.gov/mjo/" target="_blank" rel="noopener">'+tr('mjoOutlookCheck')+'</a>'
    +'</div>'
    // ---------- sources ----------
    +'<div class="helpsrc">'+tr('srcTitle')+'<br>'
      +'NOAA CPC · RONI / Niño 3.4 SST<br>'
      +'<a href="https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/enso_advisory/ensodisc.shtml" target="_blank" rel="noopener">CPC ENSO Diagnostic Discussion ↗</a><br>'
      +'BOM · IOD weekly index<br>'
      +'<a href="https://www.bom.gov.au/climate/iod/" target="_blank" rel="noopener">BOM Indian Ocean monitoring ↗</a><br>'
      +'NOAA PSL · ROMI (MJO) daily index<br>'
      +'<a href="https://psl.noaa.gov/mjo/" target="_blank" rel="noopener">NOAA MJO monitoring ↗</a>'
    +'</div>'
    +'<div class="qrbox">'
      +'<div class="qrtitle">📱 '+tr('qrTitle')+'</div>'
      +'<div class="qrframe">'+qrSvg()+'</div>'
      +'<a class="qrlink" href="https://stanleywoosweeleong.github.io/enso/" target="_blank" rel="noopener">stanleywoosweeleong.github.io/enso/</a>'
      +'<div class="qrhint">'+tr('qrHint')+'</div>'
    +'</div>';
}

// Header info icon: open the guide as a full-screen overlay over everything.
// The main screen stays untouched; closing returns to it unchanged.
function openHelp(){
  var ov = document.getElementById('helpoverlay');
  var body = document.getElementById('helpoverlaybody');
  var title = document.getElementById('helpoverlaytitle');
  if (!ov || !body) return;
  title.textContent = tr('helpToggle');
  body.innerHTML = helpContent();
  body.scrollTop = 0;
  ov.classList.add('show');
  document.body.style.overflow = 'hidden'; // lock background scroll
}
function closeHelp(){
  var ov = document.getElementById('helpoverlay');
  if (!ov) return;
  ov.classList.remove('show');
  document.body.style.overflow = '';
}
// Close when tapping the dark backdrop (but not when tapping the panel).
function helpBackdrop(e){
  if (e.target && e.target.id === 'helpoverlay') closeHelp();
}

/* ===================== BOOT ===================== */
function boot(){
  applyLang();
  setTimeout(function(){
    var b = document.getElementById('boot');
    if (b) b.style.display='none';
  }, 600);
  load();
}
window.addEventListener('load', boot);
// Register the service worker so the app shell works offline.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){ /* ignore */ });
  });
}
// safety: never let boot screen stick
setTimeout(function(){var b=document.getElementById('boot');if(b)b.style.display='none';},12000);
</script>
</body>
</html>

<!--
================================================================================
 CLOUDFLARE WORKER — enso-proxy   (reference copy; deploy separately)
================================================================================
 WHY THIS IS SEPARATE:
   NOAA CPC's index text files do NOT send an Access-Control-Allow-Origin
   header, so a browser fetch from GitHub Pages is blocked by CORS. This
   Worker fetches them server-side and re-serves them with CORS enabled.
   It CANNOT live inside this HTML file — it must run on Cloudflare's edge.

 CURRENTLY DEPLOYED AT:
   https://enso-proxy.standphoto.workers.dev      (baked into PROXY above)

 HOW TO (RE)DEPLOY:
   1. dash.cloudflare.com -> Workers & Pages -> Create -> Start with Hello World
   2. Name it: enso-proxy   -> Deploy
   3. Edit code -> paste the script below (replace all) -> Deploy
   4. Test: open  <worker-url>/?feed=weekly  -> should show NOAA text

 ENDPOINTS (append ?feed=<name>):
   ?feed=roni    -> RONI.ascii.txt   (official relative ONI, monthly/seasonal)
   ?feed=oni     -> oni.ascii.txt    (traditional ONI, monthly)
   ?feed=weekly  -> wksst9120.for    (weekly Nino-region SST anomalies)
--------------------------------------------------------------------------------

const FEEDS = {
  roni:   'https://www.cpc.ncep.noaa.gov/data/indices/RONI.ascii.txt',
  oni:    'https://www.cpc.ncep.noaa.gov/data/indices/oni.ascii.txt',
  weekly: 'https://www.cpc.ncep.noaa.gov/data/indices/wksst9120.for',
};

const CORS = {
  'Access-Control-Allow-Origin': '*',
  'Access-Control-Allow-Methods': 'GET, OPTIONS',
  'Access-Control-Allow-Headers': '*',
};

export default {
  async fetch(request) {
    if (request.method === 'OPTIONS') {
      return new Response(null, { headers: CORS });
    }

    const url = new URL(request.url);
    const feed = url.searchParams.get('feed');

    if (!feed || !FEEDS[feed]) {
      return new Response(
        JSON.stringify({ error: 'unknown feed', valid: Object.keys(FEEDS) }),
        { status: 400, headers: { ...CORS, 'Content-Type': 'application/json' } }
      );
    }

    try {
      const upstream = await fetch(FEEDS[feed], {
        cf: { cacheTtl: 1800, cacheEverything: true }, // 30 min edge cache
        headers: { 'User-Agent': 'ENSO-Monitor/1.0 (orchard weather)' },
      });

      if (!upstream.ok) {
        return new Response(
          JSON.stringify({ error: 'upstream ' + upstream.status }),
          { status: 502, headers: { ...CORS, 'Content-Type': 'application/json' } }
        );
      }

      const body = await upstream.text();
      return new Response(body, {
        headers: {
          ...CORS,
          'Content-Type': 'text/plain; charset=utf-8',
          'Cache-Control': 'public, max-age=1800',
          'X-ENSO-Feed': feed,
        },
      });
    } catch (err) {
      return new Response(
        JSON.stringify({ error: 'fetch failed', detail: String(err) }),
        { status: 500, headers: { ...CORS, 'Content-Type': 'application/json' } }
      );
    }
  },
};
